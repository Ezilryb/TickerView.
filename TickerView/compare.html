<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<!-- ══════════════════════════════════════════════════════════
     TICKERVIEW — Compare Page
     compare.html · ?symA=AAPL&symB=NVDA&tf=1Y
══════════════════════════════════════════════════════════════ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8440A">
<title>Comparer — TickerView</title>
<meta name="description" content="Comparez deux instruments côte à côte : performance normalisée, métriques financières et analyse orderflow en temps réel.">
<meta name="robots" content="index, follow">

<meta property="og:type"   content="website">
<meta property="og:url"    content="https://tickerview.app/compare">
<meta property="og:title"  content="Comparer deux instruments — TickerView">
<meta property="og:locale" content="fr_FR">

<link rel="manifest"         href="manifest.json">
<link rel="apple-touch-icon" href="src/assets/icons/icon-192.png">
<link rel="preconnect"       href="https://fonts.googleapis.com">
<link rel="preconnect"       href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;300;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/styles/variables.css">
<link rel="stylesheet" href="src/styles/global.css">
<!-- Reuse sym-search-dropdown styles from stock.css -->
<link rel="stylesheet" href="src/styles/stock.css">
<link rel="stylesheet" href="src/styles/compare.css">

<style>
  @keyframes pulse-dot {
    0%,100%{ opacity:1; box-shadow:0 0 0 0 rgba(232,68,10,0.4); }
    50%     { opacity:0.7; box-shadow:0 0 0 4px rgba(232,68,10,0); }
  }
</style>
</head>
<body>

<!-- ── NAV ────────────────────────────────────────────────── -->
<nav role="navigation" aria-label="Navigation principale" style="flex-shrink:0;">
  <a class="nav-logo" href="index.html" aria-label="TickerView — Accueil">
    TICKER<span class="logo-fire">VIEW</span>
  </a>

  <ul class="nav-links">
    <li><a href="index.html#instruments">Marchés</a></li>
    <li><a href="stock.html">Analyse</a></li>
    <li><a href="compare.html" style="color:var(--accent)">Comparer</a></li>
  </ul>

  <div class="nav-actions">
    <div class="nav-status" aria-label="Données en direct">
      <span class="nav-dot" aria-hidden="true"></span>
      <span>LIVE DATA</span>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Changer le thème"></button>
    <a href="stock.html" class="nav-cta">Terminal →</a>
  </div>
</nav>

<!-- ── COMPARE HEADER ─────────────────────────────────────── -->
<header class="compare-header" role="banner" aria-label="Comparaison de symboles">

  <!-- ── Sym A ── -->
  <div class="ch-block">
    <!-- Search A -->
    <div class="ch-search-wrap">
      <span class="ch-search-icon" aria-hidden="true">⌕</span>
      <input
        type="text"
        id="search-input-a"
        class="ch-search-input"
        placeholder="SYM A"
        aria-label="Symbole A"
        autocomplete="off"
        spellcheck="false"
      >
      <!-- Dropdown A -->
      <div id="search-dropdown-a" class="sym-search-dropdown hidden" role="listbox"></div>
    </div>
    <!-- Live info A -->
    <div class="ch-sym-info">
      <span class="ch-sym-fullname" id="ch-fullname-a">—</span>
      <span class="ch-sym-price"  id="ch-price-a">—</span>
      <span class="ch-sym-change fire" id="ch-change-a">—</span>
    </div>
  </div>

  <!-- ── VS + Swap ── -->
  <div class="ch-versus">
    <div class="ch-vs-badge" aria-hidden="true">VS</div>
    <button class="ch-swap-btn" id="btn-swap" title="Échanger les deux symboles" aria-label="Échanger les symboles">
      ⇄ échanger
    </button>
  </div>

  <!-- ── Sym B ── -->
  <div class="ch-block">
    <!-- Search B -->
    <div class="ch-search-wrap">
      <span class="ch-search-icon" aria-hidden="true">⌕</span>
      <input
        type="text"
        id="search-input-b"
        class="ch-search-input"
        placeholder="SYM B"
        aria-label="Symbole B"
        autocomplete="off"
        spellcheck="false"
      >
      <!-- Dropdown B -->
      <div id="search-dropdown-b" class="sym-search-dropdown hidden" role="listbox"></div>
    </div>
    <!-- Live info B -->
    <div class="ch-sym-info">
      <span class="ch-sym-fullname" id="ch-fullname-b">—</span>
      <span class="ch-sym-price"  id="ch-price-b">—</span>
      <span class="ch-sym-change fire" id="ch-change-b">—</span>
    </div>
  </div>

  <div class="ch-divider" aria-hidden="true"></div>

  <!-- ── Timeframes ── -->
  <div class="ch-tf-group" role="group" aria-label="Période de comparaison">
    <button class="ct-btn" data-tf="1D">1J</button>
    <button class="ct-btn" data-tf="1M">1M</button>
    <button class="ct-btn" data-tf="3M">3M</button>
    <button class="ct-btn" data-tf="6M">6M</button>
    <button class="ct-btn active" data-tf="1Y">1A</button>
    <button class="ct-btn" data-tf="5Y">5A</button>
  </div>

</header>

<!-- ── MAIN ───────────────────────────────────────────────── -->
<main class="compare-main" role="main">

  <!-- Normalized performance chart -->
  <section class="compare-chart-section" aria-label="Graphique de performance normalisée">
    <span class="compare-chart-label">Performance normalisée · base 100</span>
    <div class="compare-chart-wrap">
      <canvas id="compare-canvas" aria-label="Graphique de comparaison"></canvas>
      <canvas id="compare-overlay" aria-hidden="true"></canvas>
    </div>
  </section>

  <!-- Bottom strip: card A | metrics | card B -->
  <div class="compare-bottom" role="complementary" aria-label="Métriques comparatives">

    <div class="compare-sym-card" id="compare-card-a" aria-label="Informations symbole A"></div>

    <div class="compare-metrics-wrap">
      <div id="compare-metrics-table" role="table" aria-label="Tableau de métriques"></div>
    </div>

    <div class="compare-sym-card" id="compare-card-b" aria-label="Informations symbole B"></div>

  </div>

</main>

<!-- ── JS ─────────────────────────────────────────────────── -->
<script type="module" src="src/pages/Compare/compare.js"></script>

</body>
</html>
