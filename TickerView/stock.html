<!-- ── JS: Symbol search (inline, no bundler needed) ─────── -->
<script type="module">
import { SYMBOL_LIST } from './src/utils/symbolRegistry.js';

const input      = document.getElementById('sym-search-input');
const dropdown   = document.getElementById('sym-search-dropdown');
let selectedIdx  = -1;
let filtered     = [];

function search(q) {
  const ql = q.toLowerCase().trim();
  if (!ql) return [];
  return SYMBOL_LIST.filter(s =>
    s.sym.toLowerCase().includes(ql) ||
    s.name.toLowerCase().includes(ql) ||
    s.exchange.toLowerCase().includes(ql) ||
    s.sector.toLowerCase().includes(ql)
  ).slice(0, 8);
}

function renderDropdown(items) {
  selectedIdx = -1;
  if (!items.length) {
    dropdown.innerHTML = `<div class="sym-search-no-result">Aucun résultat pour « ${escHtml(input.value)} »</div>`;
    dropdown.classList.remove('hidden');
    return;
  }
  dropdown.innerHTML = items.map((s, i) => `
    <div class="sym-search-item" role="option" data-idx="${i}" tabindex="-1">
      <span class="sym-search-sym">${s.sym}</span>
      <span class="sym-search-name">${s.name}</span>
      <span class="sym-search-exchange">${s.exchange}</span>
    </div>
  `).join('');
  dropdown.classList.remove('hidden');

  dropdown.querySelectorAll('.sym-search-item').forEach(el => {
    el.addEventListener('click', () => navigateTo(parseInt(el.dataset.idx)));
    el.addEventListener('mouseenter', () => {
      dropdown.querySelectorAll('.sym-search-item').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selectedIdx = parseInt(el.dataset.idx);
    });
  });
}

/**
 * KEY FIX: real navigation — reload the page with the new symbol.
 * stock.js reads ?sym= from the URL and loads all data accordingly.
 */
function navigateTo(idx) {
  const s = filtered[idx];
  if (!s) return;
  window.location.href = `stock.html?sym=${encodeURIComponent(s.sym)}`;
}

function hideDropdown() {
  dropdown.classList.add('hidden');
  selectedIdx = -1;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

input.addEventListener('input', () => {
  filtered = search(input.value);
  if (!input.value.trim()) { hideDropdown(); return; }
  renderDropdown(filtered);
});

input.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.sym-search-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, filtered.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    items[selectedIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === selectedIdx));
    items[selectedIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (selectedIdx >= 0) { navigateTo(selectedIdx); return; }
    if (filtered.length) navigateTo(0);
  } else if (e.key === 'Escape') {
    hideDropdown(); input.blur();
  }
});

document.addEventListener('click', e => {
  if (!document.getElementById('sym-search-wrap').contains(e.target)) hideDropdown();
});

/* Pre-fill search with current symbol from URL */
const urlSym = new URLSearchParams(window.location.search).get('sym');
if (urlSym) input.value = urlSym;
</script>
